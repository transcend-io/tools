packages:
  - packages/*
  - packages/mcp/*

catalog:
  '@arethetypeswrong/cli': ^0.18.2
  '@changesets/cli': ^2.30.0
  '@modelcontextprotocol/sdk': ^1.29.0
  '@transcend-io/internationalization': ^2.3.2
  '@types/json-schema': ^7.0.15
  '@types/node': ^22.19.15
  '@types/semver': ^7.7.1
  husky: ^9.1.7
  oxfmt: ^0.38.0
  oxlint: ^1.53.0
  publint: ^0.3.18
  semver: ^7.7.4
  syncpack: ^14.2.0
  tsdown: ^0.21.2
  turbo: ^2.8.21
  typescript: ^5.9.3
  vitest: ^4.0.18
  zod: ^4.3.6

# Only install npm packages that are at least 3 days old
minimumReleaseAge: 4320
minimumReleaseAgeExclude:
  - '@transcend-io/*'
  # Renovate security update: lodash-es@4.18.1
  - lodash-es@4.18.1

onlyBuiltDependencies:
  - esbuild
