min_version = "2026.3.17"

[settings]
experimental = true
lockfile = true

[hooks]
postinstall = "npx corepack enable"

[env]
_.path = ["{{config_root}}/node_modules/.bin"]

[tools]
node = "22.22.3"
shellcheck = "0.11.0"

[tasks.bootstrap-ci]
description = "Install workspace dependencies with pnpm"
run = '''
if [ "${CI:-}" = "true" ]; then
  pnpm install --frozen-lockfile
else
  pnpm install
fi
'''

[tasks.bootstrap]
description = "Set up workspace"
depends = ["bootstrap-ci"]
run = '''
pnpm build
pnpm quality
'''
