# Standalone preference topics (Preferences -> Preference Topics -> Topics tab).
# Push preference-options first so option slugs exist before syncing SELECT/MULTI_SELECT topics.
preference-topics:
  - tracking-type: Marketing
    slug: ProductUpdates
    title: Product Updates
    description: Receive updates about new product features and improvements.
    type: MULTI_SELECT
    color: '#4A90E2'
    default-configuration: EmailNotifications
    show-in-privacy-center: true
    options:
      - slug: EmailNotifications
        title: Email notifications
      - slug: PushNotifications
        title: Push notifications

  - tracking-type: Marketing
    slug: Promotions
    title: Promotions
    description: Receive promotional offers and discounts.
    type: BOOLEAN
    color: '#F5A623'
    default-configuration: 'false'
    show-in-privacy-center: true
