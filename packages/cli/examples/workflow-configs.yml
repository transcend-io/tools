# DSR workflow configs are update-only — create workflows in Admin Dashboard first, then pull to get IDs.
# Replace the id below with a workflow config ID from: tr inventory pull --resources workflowConfigs
workflow-configs:
  - id: REPLACE_WITH_WORKFLOW_CONFIG_ID
    title: Customer Data Access Request
    subtitle: Submit a request to access your personal data
    description: We will compile and deliver a copy of the personal data we hold about you.
    internal-name: customer-access-workflow
    action-type: ACCESS
    data-subject-type: Customer
    visibility: PUBLISHED
    region-list:
      - US
      - CA

  - id: REPLACE_WITH_SECOND_WORKFLOW_CONFIG_ID
    title: Customer Data Erasure Request
    action-type: ERASURE
    data-subject-type: Customer
    visibility: INTERNAL
    region-list:
      - EU
