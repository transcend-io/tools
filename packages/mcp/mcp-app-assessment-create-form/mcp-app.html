<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create Assessment</title>
    <style>
      :root {
        font-family:
          system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          sans-serif;
        color: #111;
        background: #fff;
      }
      body {
        margin: 0;
        padding: 16px;
      }
      h1 {
        font-size: 1rem;
        margin: 0 0 12px;
      }
      label {
        display: block;
        font-size: 0.875rem;
        margin-bottom: 6px;
      }
      input,
      select,
      button {
        font: inherit;
      }
      input,
      select {
        width: 100%;
        max-width: 420px;
        padding: 8px;
        margin-bottom: 12px;
        box-sizing: border-box;
      }
      button {
        padding: 8px 14px;
        cursor: pointer;
      }
      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      #status {
        margin-top: 12px;
        font-size: 0.875rem;
        color: #444;
      }
      #status.error {
        color: #b00020;
      }
      #status.success {
        color: #0d6b0d;
      }
    </style>
  </head>
  <body>
    <h1 id="heading">Create assessment</h1>
    <label for="title-input">Title</label>
    <input id="title-input" type="text" placeholder="Assessment title" disabled />
    <label for="group-select">Assessment group</label>
    <select id="group-select" disabled>
      <option value="">Loading groups…</option>
    </select>
    <label for="assignee-select">Assignee</label>
    <select id="assignee-select" disabled>
      <option value="">Loading users…</option>
    </select>
    <button id="confirm-btn" type="button" disabled>Confirm and create</button>
    <div id="status" role="status"></div>
    <script type="module" src="/src/mcp-app.ts"></script>
  </body>
</html>
