name: Preview Release

on:
  pull_request:

concurrency:
  group: preview-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  preview:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      pull-requests: write
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v3
        with:
          version: 2026.3.17
          install: false
          cache: true
      - name: Bootstrap workspace
        run: |
          mise trust --yes mise.toml
          mise install --locked
          mise run bootstrap-ci
      - name: Build
        run: mise exec -- pnpm build
      - name: Publish PR previews
        shell: bash
        run: |
          set +e
          output="$(mise exec -- pnpx pkg-pr-new publish --packageManager=pnpm,yarn "./packages/*" 2>&1)"
          status=$?
          set -e

          printf '%s\n' "$output"

          if [ "$status" -eq 0 ]; then
            exit 0
          fi

          if [[ "$output" == *"is not installed on ${GITHUB_REPOSITORY}"* ]]; then
            echo "::warning::pkg.pr.new is not installed for ${GITHUB_REPOSITORY}. Skipping preview publish."
            exit 0
          fi

          exit "$status"
