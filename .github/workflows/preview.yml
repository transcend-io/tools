name: Preview Release

on:
  pull_request:
    branches-ignore:
      - 'renovate/*'

concurrency:
  group: preview-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  preview:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      pull-requests: write
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Bootstrap
        uses: ./.github/commands/bootstrap

      - name: Build
        run: pnpm build

      - name: Check package quality
        run: pnpm quality

      - name: Publish PR previews
        shell: bash
        run: | #shell
          set +e
          # Resolve publish roots from pnpm-workspace.yaml (any nesting depth); skip private packages (e.g. repo root).
          PACKAGE_PATHS=()
          while IFS= read -r line; do
            PACKAGE_PATHS+=("$line")
          done < <(pnpm list -r --depth -1 --json | jq -r '.[] | select(.private != true) | .path')
          output="$(pnpx pkg-pr-new publish --pnpm --packageManager=pnpm,yarn "${PACKAGE_PATHS[@]}" 2>&1)"
          status=$?
          set -e

          printf '%s\n' "$output"

          if [ "$status" -eq 0 ]; then
            exit 0
          fi

          if [[ "$output" == *"is not installed on ${GITHUB_REPOSITORY}"* ]]; then
            echo "::warning::pkg.pr.new is not installed for ${GITHUB_REPOSITORY}. Skipping preview publish."
            exit 0
          fi

          exit "$status"
