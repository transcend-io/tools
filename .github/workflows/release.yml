name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      id-token: write
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: jdx/mise-action@v3
        with:
          version: 2026.2.17
          install: false
          cache: true
      - name: Bootstrap workspace
        run: |
          mise trust --yes mise.toml
          mise install --locked
          mise exec -- npm install -g npm@^11.5.1
          mise run bootstrap-ci
      - name: Check dependency versions
        run: mise exec -- pnpm check:deps
      - name: Lint
        run: mise exec -- pnpm lint
      - name: Check formatting
        run: mise exec -- pnpm format:check
      - name: Typecheck
        run: mise exec -- pnpm typecheck
      - name: Build
        run: mise exec -- pnpm build
      - name: Test
        run: mise exec -- pnpm test
      - name: Check exports
        run: mise exec -- pnpm check:exports
      - uses: actions/create-github-app-token@v3
        id: release_app
        with:
          app-id: ${{ vars.TRANSCEND_RELEASER_APP_ID }}
          private-key: ${{ secrets.TRANSCEND_RELEASER_APP_PRIVATE_KEY }}
          permission-contents: write
          permission-pull-requests: write
      - uses: changesets/action@v1
        with:
          publish: mise exec -- pnpm release
          version: mise exec -- pnpm changeset:version:release
        env:
          GITHUB_TOKEN: ${{ steps.release_app.outputs.token }}
