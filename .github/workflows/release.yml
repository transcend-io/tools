name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      pull-requests: write
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: jdx/mise-action@v3
        with:
          version: 2026.2.17
          install: false
          cache: true
      - run: mise trust --yes mise.toml
      - run: mise install --locked
      - run: mise run bootstrap
      - run: mise exec -- pnpm syncpack:lint
      - run: mise exec -- pnpm lint
      - run: mise exec -- pnpm format:check
      - run: mise exec -- pnpm typecheck
      - run: mise exec -- pnpm build
      - run: mise exec -- pnpm test
      - run: mise exec -- pnpm check-exports
      - uses: changesets/action@v1
        with:
          publish: mise exec -- pnpm release
          version: mise exec -- pnpm version-packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
