name: Publish

on:
  pull_request:
    types:
      - closed
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'changeset-release/main')
    runs-on: ubuntu-24.04-arm
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          # Publish the release PR tree, not the merge-queue commit that may
          # include newer changesets for the next release. Manual reruns use main.
          ref: ${{ github.event_name == 'workflow_dispatch' && 'main' || github.event.pull_request.head.sha }}
          persist-credentials: false

      - name: Bootstrap
        uses: ./.github/commands/bootstrap

      - name: Check package consistency
        run: pnpm check:packages

      - name: Check dependency versions
        run: pnpm check:deps

      - name: Lint
        run: pnpm lint

      - name: Check formatting
        run: pnpm format:check

      - name: Check types
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Check exports
        run: pnpm check:exports

      - name: Check publish compatibility
        run: pnpm check:publint

      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        id: release_app
        with:
          app-id: ${{ vars.TRANSCEND_RELEASER_APP_ID }}
          private-key: ${{ secrets.TRANSCEND_RELEASER_APP_PRIVATE_KEY }}
          permission-contents: write

      - name: Publish packages
        uses: changesets/action@v1
        with:
          publish: pnpm release
        env:
          GITHUB_TOKEN: ${{ steps.release_app.outputs.token }}
