name: CI

on:
  pull_request:
  merge_group:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  global:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Bootstrap
        uses: ./.github/commands/bootstrap

      - if: github.event_name == 'pull_request'
        name: Check changeset
        env:
          CHANGESET_BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: pnpm check:changeset

      - name: Check package consistency
        run: pnpm check:packages

      - name: Check dependency versions
        run: pnpm check:deps

      - name: Lint
        run: pnpm lint

      - name: Check formatting
        run: pnpm format:check

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Check package quality
        run: pnpm quality

      - name: Check exports
        run: pnpm check:exports

      - name: Check publish compatibility
        run: pnpm check:publint

  cli:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Bootstrap
        uses: ./.github/commands/bootstrap

      - name: Build
        run: pnpm build

      - name: Check package quality
        run: pnpm quality

      - name: Verify generated CLI files are up to date
        run: |
          pnpm --dir packages/cli genfiles
          git diff --quiet HEAD || (git diff --raw && echo "Detected git changes after regenerating CLI files" && exit 1)
