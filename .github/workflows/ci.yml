name: CI

on:
  pull_request:
  merge_group:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  global:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: jdx/mise-action@v3
        with:
          version: 2026.2.17
          install: false
          cache: true
      - run: mise trust --yes mise.toml
      - run: mise install --locked
      - run: mise run bootstrap
      - if: github.event_name == 'pull_request'
        env:
          CHANGESET_BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: mise exec -- pnpm check:changeset
      - run: mise exec -- pnpm syncpack:lint
      - run: mise exec -- pnpm lint
      - run: mise exec -- pnpm format:check
      - run: mise exec -- pnpm typecheck
      - run: mise exec -- pnpm build
      - run: mise exec -- pnpm test
      - run: mise exec -- pnpm check-exports

  cli:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v3
        with:
          version: 2026.2.17
          install: false
          cache: true
      - run: mise trust --yes mise.toml
      - run: mise install --locked
      - run: mise run bootstrap
      - run: mise exec -- pnpm --dir packages/cli genfiles
      - name: Ensure no files changed
        run: git diff --quiet HEAD || (git diff --raw && echo "Detected untracked changes in git after running command '${{ matrix.command }}'" && exit 1)
